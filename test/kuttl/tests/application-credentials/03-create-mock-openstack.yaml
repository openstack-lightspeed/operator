---
apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: |
      #!/bin/bash
      set -euo pipefail
      oc apply -f ../../common/mock-openstack/mock-keystone.yaml
      oc apply -f ../../common/mock-openstack/mock-oscp-resources.yaml

      echo "Waiting for mock keystone to be ready..."
      oc wait --for=condition=Ready pod/mock-keystone-server \
        -n openstack --timeout=180s
    timeout: 240
