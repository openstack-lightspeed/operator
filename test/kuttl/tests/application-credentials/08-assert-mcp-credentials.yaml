---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
commands:
  - script: |
      #!/bin/bash
      set -euo pipefail

      echo "Waiting for openstack-config ConfigMap with AC credentials..."
      for i in $(seq 1 60); do
        CLOUDS=$(oc get configmap openstack-config -n openstack-lightspeed \
          -o jsonpath='{.data.clouds\.yaml}' 2>/dev/null || true)
        if echo "$CLOUDS" | grep -q "v3applicationcredential"; then
          echo "Found v3applicationcredential auth type"
          break
        fi
        if [ "$i" -eq 60 ]; then
          echo "ERROR: openstack-config ConfigMap not updated with AC credentials after 120s"
          echo "Current clouds.yaml content:"
          echo "$CLOUDS"
          exit 1
        fi
        sleep 2
      done

      # Verify AC ID in clouds.yaml
      if ! echo "$CLOUDS" | grep -q "application_credential_id: mock-ac-id-12345"; then
        echo "ERROR: clouds.yaml missing application_credential_id"
        echo "$CLOUDS"
        exit 1
      fi
      echo "clouds.yaml has correct application_credential_id"

      # Verify auth_url in clouds.yaml
      if ! echo "$CLOUDS" | grep -q "auth_url: http://mock-keystone-server.openstack.svc:5000/v3"; then
        echo "ERROR: clouds.yaml missing correct auth_url"
        echo "$CLOUDS"
        exit 1
      fi
      echo "clouds.yaml has correct auth_url"

      # Verify openstack-config-secret Secret
      SECURE=$(oc get secret openstack-config-secret -n openstack-lightspeed \
        -o jsonpath='{.data.secure\.yaml}' | base64 -d)
      if ! echo "$SECURE" | grep -q "application_credential_secret: mock-ac-secret-abcde"; then
        echo "ERROR: secure.yaml missing application_credential_secret"
        echo "$SECURE"
        exit 1
      fi
      echo "secure.yaml has correct application_credential_secret"

      # Verify MCP config has OpenStack enabled
      MCP_CFG=$(oc get configmap mcp-config -n openstack-lightspeed \
        -o jsonpath='{.data.config\.yaml}')
      if ! echo "$MCP_CFG" | grep -qP "openstack:\s*\n\s+enabled:\s+true"; then
        # Try with a simpler grep
        ENABLED=$(echo "$MCP_CFG" | grep -A1 "openstack:" | grep "enabled:" | tr -d ' ')
        if [ "$ENABLED" != "enabled:true" ]; then
          echo "ERROR: MCP config does not have openstack enabled"
          echo "$MCP_CFG"
          exit 1
        fi
      fi
      echo "MCP config has OpenStack enabled"

      # Verify combined-ca-bundle secret was copied
      if ! oc get secret combined-ca-bundle -n openstack-lightspeed 2>/dev/null; then
        echo "ERROR: combined-ca-bundle secret not found in openstack-lightspeed namespace"
        exit 1
      fi
      echo "CA bundle secret copied to openstack-lightspeed namespace"

      # Verify AC secret has the finalizer
      FINALIZERS=$(oc get secret ac-lightspeed-test-secret -n openstack \
        -o jsonpath='{.metadata.finalizers}')
      if ! echo "$FINALIZERS" | grep -q "openstack.org/lightspeed-ac-consumer"; then
        echo "ERROR: AC secret missing finalizer"
        echo "Finalizers: $FINALIZERS"
        exit 1
      fi
      echo "AC secret has lightspeed-ac-consumer finalizer"

      echo "All MCP credential assertions passed"
    timeout: 180
