---
apiVersion: v1
kind: Secret
metadata:
  name: openstack-lightspeed-apitoken-update
  namespace: openstack-lightspeed
type: Opaque
stringData:
  apitoken: xxx
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openstack-lightspeed-cert-update
  namespace: openstack-lightspeed
---
apiVersion: lightspeed.openstack.org/v1beta1
kind: OpenStackLightspeed
metadata:
  name: openstack-lightspeed
  namespace: openstack-lightspeed
spec:
  llmEndpoint: http://mock-llm-api-server-pod-UPDATE:8000/v1
  llmEndpointType: rhoai_vllm
  llmCredentials: openstack-lightspeed-apitoken-update
  modelName: ibm-granite/granite-3.1-8b-instruct-UPDATE
  tlsCACertBundle: openstack-lightspeed-cert-update
  llmProjectID: test-project-id-UPDATE
  llmDeploymentName: test-deployment-name-UPDATE
  llmAPIVersion: v1.1
  feedbackDisabled: true
  transcriptsDisabled: true
  # NOTE(lpiwowar): We have to keep enableOCPRAG: false even after the update
  # because the OpenStack Lightspeed vector DB image does not contain OCP content.
  # We can set it to `true` once the OCP contant is present in the image.
  enableOCPRAG: false
  ocpVersionOverride: "4.16"
