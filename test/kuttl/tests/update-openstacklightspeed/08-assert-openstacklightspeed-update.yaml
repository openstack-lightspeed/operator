  name: lightspeed-console-plugin
  namespace: openstack-lightspeed
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: lightspeed-console-plugin
  namespace: openstack-lightspeed
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: lightspeed-console-plugin
  namespace: openstack-lightspeed
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lightspeed-console-plugin
  namespace: openstack-lightspeed
spec:
  template:
    spec:
      initContainers:
        - name: rewrite-locales
          volumeMounts:
            - name: locales-rewrite
              mountPath: /locales-rewrite
---
apiVersion: v1
kind: Service
metadata:
  name: lightspeed-console-plugin
  namespace: openstack-lightspeed
---
apiVersion: console.openshift.io/v1
kind: ConsolePlugin
metadata:
  name: lightspeed-console-plugin

# OpenStackLightspeed CR status
---
apiVersion: lightspeed.openstack.org/v1beta1
kind: OpenStackLightspeed
metadata:
  name: openstack-lightspeed
  namespace: openstack-lightspeed
spec:
  llmEndpoint: http://mock-llm-api-server-pod-UPDATE:8000/v1
  llmEndpointType: rhoai_vllm
  llmCredentials: openstack-lightspeed-apitoken-update
  modelName: ibm-granite/granite-3.1-8b-instruct-UPDATE
  tlsCACertBundle: openstack-lightspeed-cert-update
  llmProjectID: test-project-id-UPDATE
  llmDeploymentName: test-deployment-name-UPDATE
  llmAPIVersion: v1.1
  feedbackDisabled: true
  transcriptsDisabled: true
  enableOCPRAG: false
  ocpVersionOverride: "4.16"
  logging:
    ogxLogLevel: "core=debug,providers=info"
    lightspeedStackLogLevel: ERROR
status:
  conditions:
    - type: Ready
      status: "True"
      reason: Ready
      message: Setup complete
    - type: OCPRAGReady
      status: "True"
      message: OCP RAG is disabled
    - type: OpenStackLightspeedReady
      status: "True"
      reason: Ready
      message: OpenStack Lightspeed created
