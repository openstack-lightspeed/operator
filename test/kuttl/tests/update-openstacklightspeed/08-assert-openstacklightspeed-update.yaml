# LCore resources
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: lightspeed-app-server
  namespace: openstack-lightspeed
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llama-stack-config
  namespace: openstack-lightspeed
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lightspeed-stack-config
  namespace: openstack-lightspeed
---
apiVersion: v1
kind: Service
metadata:
  name: lightspeed-app-server
  namespace: openstack-lightspeed
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lightspeed-stack-deployment
  namespace: openstack-lightspeed
  generation: 2
spec:
  template:
    spec:
      containers:
      - name: llama-stack
        env:
        - name: OPENSTACK_LIGHTSPEED_PROVIDER_API_KEY
          valueFrom:
            secretKeyRef:
              key: apitoken
              name: openstack-lightspeed-apitoken-update
        - name: VLLM_URL
          value: http://mock-llm-api-server-pod-UPDATE:8000/v1
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: password
              name: lightspeed-postgres-secret
        - name: LLAMA_STACK_LOGGING
          value: core=debug,providers=info
        - name: OGX_LOGGING
          value: core=debug,providers=info
        - name: VECTOR_DB_DATA_PATH
          value: /vector-db-discovered-values
        - name: REQUESTS_CA_BUNDLE
          value: /etc/certs/additional-ca/cert.crt
        - name: SSL_CERT_FILE
          value: /etc/certs/additional-ca/cert.crt
      - name: lightspeed-service-api
        env:
        - name: LIGHTSPEED_STACK_LOG_LEVEL
          value: ERROR
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: password
              name: lightspeed-postgres-secret
status:
  replicas: 1
  readyReplicas: 1
  availableReplicas: 1
  observedGeneration: 2
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: lightspeed-app-server
  namespace: openstack-lightspeed

