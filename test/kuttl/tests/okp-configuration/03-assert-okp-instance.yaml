##############################################################################
#       Assert that the operator created all expected OKP resources          #
##############################################################################

# OKP Deployment
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lightspeed-okp-server
  namespace: openstack-lightspeed
spec:
  template:
    spec:
      containers:
        - name: okp
          ports:
            - name: okp
              containerPort: 8080
status:
  replicas: 1
  readyReplicas: 1
  availableReplicas: 1

# OKP Service
---
apiVersion: v1
kind: Service
metadata:
  name: lightspeed-okp-server
  namespace: openstack-lightspeed
spec:
  ports:
    - name: http
      port: 8080
      protocol: TCP
      targetPort: okp
  type: ClusterIP

# Postgres Deployment
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lightspeed-postgres-server
  namespace: openstack-lightspeed
status:
  replicas: 1
  readyReplicas: 1
  availableReplicas: 1

# Main deployment with OKP env vars
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lightspeed-stack-deployment
  namespace: openstack-lightspeed
spec:
  template:
    spec:
      containers:
        - name: llama-stack
          env:
            - name: OPENSTACK_LIGHTSPEED_PROVIDER_API_KEY
              valueFrom:
                secretKeyRef:
                  key: apitoken
                  name: openstack-lightspeed-apitoken
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: lightspeed-postgres-secret
            - name: PGSSLMODE
              value: verify-full
            - name: PGSSLROOTCERT
              value: /etc/pki/ca-trust/extracted/pem/tls-ca-bundle.pem
            - name: LLAMA_STACK_LOGGING
              value: all=debug
            - name: OGX_LOGGING
              value: all=debug
            - name: VECTOR_DB_DATA_PATH
              value: /vector-db-discovered-values
            - name: RH_SERVER_OKP
              value: http://lightspeed-okp-server.openstack-lightspeed.svc:8080
        - name: lightspeed-service-api
          env:
            - name: LIGHTSPEED_STACK_LOG_LEVEL
              value: WARNING
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: lightspeed-postgres-secret
            - name: RH_SERVER_OKP
              value: http://lightspeed-okp-server.openstack-lightspeed.svc:8080
        - name: lightspeed-to-dataverse-exporter
          args:
            - --mode
            - openshift
            - --config
            - /etc/config/config.yaml
            - --log-level
            - DEBUG
            - --data-dir
            - /tmp/data
        - name: rhos-mcp
          volumeMounts:
            - name: openstack-config-secret
              mountPath: /app/secure.yaml
              subPath: secure.yaml
            - name: openstack-config
              mountPath: /app/clouds.yaml
              subPath: clouds.yaml
            - name: combined-ca-bundle
              mountPath: /app/tls-ca-bundle.pem
              subPath: tls-ca-bundle.pem
              readOnly: true
            - name: mcp-config
              mountPath: /app/config.yaml
              subPath: config.yaml
status:
  replicas: 1
  readyReplicas: 1
  availableReplicas: 1

# OpenStackLightspeed CR status
---
apiVersion: lightspeed.openstack.org/v1beta1
kind: OpenStackLightspeed
metadata:
  name: openstack-lightspeed
  namespace: openstack-lightspeed
status:
  conditions:
    - type: Ready
      status: "True"
      reason: Ready
      message: Setup complete
    - type: OCPRAGReady
      status: "True"
      reason: Ready
      message: OCP RAG is disabled
    - type: OpenStackLightspeedMCPServerReady
      status: "True"
    - type: OpenStackLightspeedReady
      status: "True"
      reason: Ready
      message: OpenStack Lightspeed created
