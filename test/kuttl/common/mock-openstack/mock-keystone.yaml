##############################################################################
#  Mock Keystone v3 API server for application credential kuttl tests      #
##############################################################################
---
apiVersion: v1
kind: Namespace
metadata:
  name: openstack
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mock-keystone-code
  namespace: openstack
data:
  app.py: |
    from http.server import HTTPServer, BaseHTTPRequestHandler
    import json

    URL = "http://mock-keystone-server.openstack.svc:5000/v3"
    TOKEN = "mock-token-12345"
    USER_ID = "mock-user-id-lightspeed"
    PROJECT_ID = "mock-project-id-service"
    ROLE_ID = "mock-role-id-admin"

    AUTH_RESPONSE = json.dumps({"token": {
        "methods": ["password"],
        "expires_at": "2099-12-31T23:59:59.000000Z",
        "user": {"id": "admin-user-id", "name": "admin",
                 "domain": {"id": "default", "name": "Default"}},
        "project": {"id": "admin-project-id", "name": "admin",
                    "domain": {"id": "default", "name": "Default"}},
        "catalog": [{"name": "keystone", "type": "identity", "endpoints": [
            {"region_id": "regionOne", "region": "regionOne",
             "url": URL, "interface": i, "id": "ep-" + i}
            for i in ("admin", "internal", "public")
        ]}]
    }})

    class Handler(BaseHTTPRequestHandler):
        def _read_body(self):
            length = int(self.headers.get("Content-Length", 0))
            return self.rfile.read(length) if length else b""

        def _json(self, code, body):
            data = json.dumps(body).encode()
            self.send_response(code)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(data)))
            self.end_headers()
            self.wfile.write(data)

        def _no_content(self):
            self.send_response(204)
            self.end_headers()

        def do_POST(self):
            self._read_body()
            if self.path == "/v3/auth/tokens":
                data = AUTH_RESPONSE.encode()
                self.send_response(201)
                self.send_header("Content-Type", "application/json")
                self.send_header("Content-Length", str(len(data)))
                self.send_header("X-Subject-Token", TOKEN)
                self.end_headers()
                self.wfile.write(data)
            elif self.path == "/v3/users":
                self._json(201, {"user": {"id": USER_ID, "name": "lightspeed",
                    "domain_id": "default", "enabled": True,
                    "password_expires_at": None,
                    "links": {"self": URL + "/users/" + USER_ID}}})
            else:
                self._json(404, {"error": "not found"})

        def do_GET(self):
            if self.path.startswith("/v3/projects"):
                self._json(200, {"projects": [
                    {"id": PROJECT_ID, "name": "service", "domain_id": "default",
                     "enabled": True, "links": {"self": URL + "/projects/" + PROJECT_ID}}
                ], "links": {"self": URL + "/projects", "next": None, "previous": None}})
            elif self.path.startswith("/v3/roles"):
                self._json(200, {"roles": [
                    {"id": ROLE_ID, "name": "admin",
                     "links": {"self": URL + "/roles/" + ROLE_ID}}
                ], "links": {"self": URL + "/roles", "next": None, "previous": None}})
            elif self.path.startswith("/v3/users"):
                self._json(200, {"users": [
                    {"id": USER_ID, "name": "lightspeed", "domain_id": "default",
                     "enabled": True, "links": {"self": URL + "/users/" + USER_ID}}
                ], "links": {"self": URL + "/users", "next": None, "previous": None}})
            else:
                self._json(200, {})

        def do_PUT(self):
            self._read_body()
            self._no_content()

        def do_DELETE(self):
            self._no_content()

        def do_PATCH(self):
            self._read_body()
            self._json(200, {"user": {"id": USER_ID}})

    print("Mock keystone starting on :5000", flush=True)
    HTTPServer(("", 5000), Handler).serve_forever()
---
apiVersion: v1
kind: Pod
metadata:
  name: mock-keystone-server
  namespace: openstack
  labels:
    app: mock-keystone-server
spec:
  containers:
    - name: mock-keystone
      image: registry.redhat.io/ubi8/python-311:latest
      ports:
        - containerPort: 5000
      volumeMounts:
        - name: app-code
          mountPath: /app
      workingDir: /app
      command:
        - python3
        - /app/app.py
  volumes:
    - name: app-code
      configMap:
        name: mock-keystone-code
---
apiVersion: v1
kind: Service
metadata:
  name: mock-keystone-server
  namespace: openstack
spec:
  selector:
    app: mock-keystone-server
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
