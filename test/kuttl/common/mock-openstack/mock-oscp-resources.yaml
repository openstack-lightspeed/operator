# OpenStackControlPlane instance
---
apiVersion: core.openstack.org/v1beta1
kind: OpenStackControlPlane
metadata:
  name: openstack-galera-network-isolation
  namespace: openstack
spec:
  openstackclient:
    template:
      openStackConfigMap: openstack-config-mock
      openStackConfigSecret: openstack-config-secret-mock
status:
  tls:
    caBundleSecretName: combined-ca-bundle-mock
