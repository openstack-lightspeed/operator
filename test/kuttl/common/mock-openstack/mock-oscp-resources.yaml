##############################################################################
#  Mock OpenStackControlPlane and openstackclient resources for AC tests   #
##############################################################################

# openstackclient clouds.yaml ConfigMap
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openstack-config-mock
  namespace: openstack
data:
  clouds.yaml: |
    clouds:
      default:
        auth:
          auth_url: http://mock-keystone-server.openstack.svc:5000/v3
          username: admin
        region_name: regionOne

# openstackclient secure.yaml Secret
---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: openstack-config-secret-mock
  namespace: openstack
stringData:
  secure.yaml: |
    clouds:
      default:
        auth:
          password: admin-password

