repos:
  - repo: local
    hooks:
      - id: make-lint
        name: make-lint
        language: system
        entry: make
        args: ['lint']
        pass_filenames: false
      - id: shellcheck
        name: shellcheck
        language: system
        entry: shellcheck
        types: [shell]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff
      - id: ruff-format
